name: GoalRush Global — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Quality Check ────────────────────────────────────────
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No cache — monorepo has no root package-lock.json

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install web dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Type check
        run: npm run type-check
        working-directory: apps/web
        continue-on-error: true

      - name: Lint
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

  # ─── Post-Deploy Health Check ─────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Railway to boot
        run: sleep 45

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://renewed-ambition-production-ea0a.up.railway.app/health)
          if [ "$STATUS" != "200" ]; then echo "API health check failed: $STATUS"; exit 1; fi
          echo "API is healthy"
