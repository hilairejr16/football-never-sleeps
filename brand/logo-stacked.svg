<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580" role="img" aria-label="GoalRush Global Stacked Logo">
  <title>GoalRush Global — Stacked Logo</title>
  <defs>
    <linearGradient id="bg-s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="red-s" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#f05555"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="gold-s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#92700a"/>
    </linearGradient>
    <filter id="glow-s" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-s">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="580" fill="url(#bg-s)"/>

  <!-- Red ambient glow -->
  <circle cx="250" cy="190" r="170" fill="#dc2626" opacity="0.10" filter="url(#glow-s)"/>

  <!-- Outer gold ring -->
  <circle cx="250" cy="190" r="156" fill="none" stroke="url(#gold-s)" stroke-width="1.5" opacity="0.50"/>

  <!-- Red badge circle -->
  <circle cx="250" cy="190" r="150" fill="url(#red-s)" filter="url(#shadow-s)"/>

  <!-- Glass highlight -->
  <ellipse cx="200" cy="138" rx="60" ry="36" fill="white" opacity="0.08"/>

  <!-- Lightning bolt — centered in circle -->
  <g transform="translate(250,190) scale(2.0) translate(-50,-50)">
    <path d="M 57,4 L 24,54 L 47,54 L 43,96 L 76,46 L 53,46 Z" fill="white"/>
    <path d="M 57,4 L 53,46 L 60,24 Z" fill="white" opacity="0.28"/>
  </g>

  <!-- Horizontal gold rules flanking the text block -->
  <line x1="50" y1="370" x2="190" y2="370" stroke="url(#gold-s)" stroke-width="1" opacity="0.6"/>
  <line x1="310" y1="370" x2="450" y2="370" stroke="url(#gold-s)" stroke-width="1" opacity="0.6"/>

  <!-- GOALRUSH stacked text -->
  <text x="250" y="432"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="90" font-weight="900" fill="white" letter-spacing="2">GOALRUSH</text>

  <!-- Red underline accent -->
  <rect x="50" y="442" width="400" height="3" fill="#dc2626" rx="1.5"/>

  <!-- GLOBAL in gold -->
  <text x="250" y="490"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="32" fill="url(#gold-s)" letter-spacing="22">GLOBAL</text>

  <!-- Tagline -->
  <text x="250" y="545"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic" font-size="18" fill="#d4af37" opacity="0.75" letter-spacing="1.5">Football Never Sleeps.</text>
</svg>
