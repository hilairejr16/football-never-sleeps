<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="GoalRush Global Icon">
  <title>GoalRush Global — Icon Mark</title>
  <defs>
    <radialGradient id="red-i" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#f06060"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="gold-i" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#92700a"/>
    </linearGradient>
    <linearGradient id="bg-i" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow-i" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-i" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="bolt-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square (use for export; hide for circular profile) -->
  <rect width="500" height="500" fill="url(#bg-i)"/>

  <!-- Outer red glow halo -->
  <circle cx="250" cy="250" r="248" fill="#dc2626" opacity="0.08" filter="url(#glow-i)"/>

  <!-- Double gold ring system -->
  <circle cx="250" cy="250" r="234" fill="none" stroke="url(#gold-i)" stroke-width="2.5" opacity="0.35"/>
  <circle cx="250" cy="250" r="226" fill="none" stroke="url(#gold-i)" stroke-width="1" opacity="0.55"/>

  <!-- Main red circle -->
  <circle cx="250" cy="250" r="218" fill="url(#red-i)" filter="url(#shadow-i)"/>

  <!-- Glass shimmer highlight -->
  <ellipse cx="192" cy="168" rx="85" ry="50" fill="white" opacity="0.07"/>

  <!-- Lightning bolt — large, centered, bold -->
  <!-- Scale=3.0 in 100x100 viewbox, centered at (250,250) -->
  <g transform="translate(250,250) scale(3.0) translate(-50,-50)">
    <path d="M 57,4 L 24,54 L 47,54 L 43,96 L 76,46 L 53,46 Z"
      fill="white" filter="url(#bolt-glow)"/>
    <!-- Inner highlight for premium depth -->
    <path d="M 57,4 L 53,46 L 59,25 Z" fill="white" opacity="0.30"/>
    <path d="M 43,96 L 47,54 L 41,72 Z" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- Subtle bottom text: GRG monogram at base of circle -->
  <text x="250" y="452"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="22" fill="url(#gold-i)" letter-spacing="10" opacity="0.70">GRG</text>
</svg>
