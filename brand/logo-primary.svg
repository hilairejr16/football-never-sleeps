<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" role="img" aria-label="GoalRush Global">
  <title>GoalRush Global — Football Never Sleeps.</title>
  <defs>
    <linearGradient id="bg-p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="red-p" cx="36%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f05555"/>
      <stop offset="60%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#8b1010"/>
    </radialGradient>
    <linearGradient id="gold-p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9a7a10"/>
    </linearGradient>
    <filter id="glow-p" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-p" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" fill="url(#bg-p)"/>

  <!-- Red ambient halo behind icon -->
  <circle cx="100" cy="100" r="98" fill="#dc2626" opacity="0.10" filter="url(#glow-p)"/>

  <!-- Gold ring (premium outer ring) -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="url(#gold-p)" stroke-width="1.5" opacity="0.55"/>

  <!-- Main red badge circle -->
  <circle cx="100" cy="100" r="82" fill="url(#red-p)" filter="url(#shadow-p)"/>

  <!-- Glass highlight on circle -->
  <ellipse cx="78" cy="68" rx="32" ry="19" fill="white" opacity="0.08"/>

  <!-- Lightning bolt — centered in circle, scale=1.15 for bold presence -->
  <g transform="translate(100,100) scale(1.15) translate(-50,-50)">
    <path d="M 57,4 L 24,54 L 47,54 L 43,96 L 76,46 L 53,46 Z" fill="white"/>
    <!-- Subtle inner highlight for depth -->
    <path d="M 57,4 L 53,46 L 61,30 Z" fill="white" opacity="0.25"/>
  </g>

  <!-- Vertical separator -->
  <line x1="196" y1="28" x2="196" y2="172" stroke="#dc2626" stroke-width="1" opacity="0.35"/>

  <!-- GOALRUSH wordmark -->
  <text x="216" y="117"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', 'Helvetica Neue', sans-serif"
    font-size="96" font-weight="900" fill="white" letter-spacing="-1">GOALRUSH</text>

  <!-- GLOBAL in gold -->
  <text x="223" y="154"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="27" fill="url(#gold-p)" letter-spacing="16">GLOBAL</text>

  <!-- Red accent rule -->
  <rect x="216" y="163" width="555" height="1.5" fill="#dc2626" opacity="0.55" rx="1"/>

  <!-- Tagline -->
  <text x="218" y="181"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic" font-size="13.5" fill="#d4af37" opacity="0.80" letter-spacing="0.8">Football Never Sleeps.</text>
</svg>
