<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-label="GoalRush Global Profile Picture">
  <title>GoalRush Global — Social Media Profile Picture</title>
  <defs>
    <radialGradient id="red-pp" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#f06060"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="gold-pp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#92700a"/>
    </linearGradient>
    <linearGradient id="bg-pp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="vignette-pp" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="glow-pp" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-pp" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.70"/>
    </filter>
    <filter id="bolt-glow-pp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Circular clip for safe-zone guidance (all content within 900px diameter) -->
    <clipPath id="circle-crop">
      <circle cx="500" cy="500" r="500"/>
    </clipPath>
  </defs>

  <!-- Background — fills full 1000×1000, corners will be hidden by circular crop on most platforms -->
  <rect width="1000" height="1000" fill="url(#bg-pp)"/>
  <rect width="1000" height="1000" fill="url(#vignette-pp)"/>

  <!-- Outer red ambient glow -->
  <circle cx="500" cy="500" r="490" fill="#dc2626" opacity="0.07" filter="url(#glow-pp)"/>

  <!-- Triple ring system (luxury watch aesthetic) -->
  <circle cx="500" cy="500" r="470" fill="none" stroke="url(#gold-pp)" stroke-width="1"   opacity="0.20"/>
  <circle cx="500" cy="500" r="460" fill="none" stroke="url(#gold-pp)" stroke-width="2.5" opacity="0.45"/>
  <circle cx="500" cy="500" r="450" fill="none" stroke="url(#gold-pp)" stroke-width="1"   opacity="0.25"/>

  <!-- Main red badge circle — centered, clear of all ring crops -->
  <circle cx="500" cy="500" r="420" fill="url(#red-pp)" filter="url(#shadow-pp)"/>

  <!-- Glass shimmer highlight (upper-left quadrant, classic badge lighting) -->
  <ellipse cx="380" cy="320" rx="170" ry="100" fill="white" opacity="0.07"/>

  <!-- Lightning bolt — bold, centered, hero scale -->
  <!-- Path in 0 0 100 100 viewbox; scale=6.0 fills the badge impressively -->
  <g transform="translate(500,500) scale(6.0) translate(-50,-50)">
    <path d="M 57,4 L 24,54 L 47,54 L 43,96 L 76,46 L 53,46 Z"
      fill="white" filter="url(#bolt-glow-pp)"/>
    <!-- Inner highlight planes for 3D depth -->
    <path d="M 57,4 L 53,46 L 60,24 Z" fill="white" opacity="0.32"/>
    <path d="M 43,96 L 47,54 L 40,74 Z" fill="rgba(0,0,0,0.18)"/>
  </g>

  <!-- Subtle GRG monogram at base of circle — stays within circular crop -->
  <text x="500" y="880"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="38" fill="url(#gold-pp)" letter-spacing="18" opacity="0.65">GRG</text>
</svg>
