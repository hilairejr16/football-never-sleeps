<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="GoalRush Global Instagram Brand Post">
  <title>GoalRush Global — Instagram Brand Announcement Post</title>
  <defs>
    <linearGradient id="bg-ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="center-glow-ig" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="red-badge-ig" cx="35%" cy="27%" r="65%">
      <stop offset="0%" stop-color="#f06060"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="gold-ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#92700a"/>
    </linearGradient>
    <!-- Gold border gradient -->
    <linearGradient id="border-ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e" stop-opacity="0.70"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#92700a" stop-opacity="0.70"/>
    </linearGradient>
    <!-- Bottom gradient overlay for text legibility -->
    <linearGradient id="overlay-ig" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="badge-shadow-ig" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="32" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="glow-ig" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bolt-glow-ig" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-shadow-ig">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.80"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1080" height="1080" fill="url(#bg-ig)"/>
  <rect width="1080" height="1080" fill="url(#center-glow-ig)"/>

  <!-- Gold border frame -->
  <rect x="18" y="18" width="1044" height="1044" fill="none" stroke="url(#border-ig)" stroke-width="2" rx="4"/>
  <rect x="26" y="26" width="1028" height="1028" fill="none" stroke="url(#gold-ig)" stroke-width="0.8" opacity="0.25" rx="2"/>

  <!-- Corner accent marks (F1 / sports broadcast aesthetic) -->
  <!-- Top-left -->
  <line x1="18" y1="18" x2="80" y2="18" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <line x1="18" y1="18" x2="18" y2="80" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <!-- Top-right -->
  <line x1="1062" y1="18" x2="1000" y2="18" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <line x1="1062" y1="18" x2="1062" y2="80" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <!-- Bottom-left -->
  <line x1="18" y1="1062" x2="80" y2="1062" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <line x1="18" y1="1062" x2="18" y2="1000" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <!-- Bottom-right -->
  <line x1="1062" y1="1062" x2="1000" y2="1062" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>
  <line x1="1062" y1="1062" x2="1062" y2="1000" stroke="url(#gold-ig)" stroke-width="3" opacity="0.80"/>

  <!-- Decorative circular rings — large, background texture -->
  <circle cx="540" cy="456" r="420" fill="none" stroke="url(#gold-ig)" stroke-width="0.8" opacity="0.08"/>
  <circle cx="540" cy="456" r="380" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.07"/>

  <!-- Hero badge — centered upper section -->
  <!-- Outer ambient glow -->
  <circle cx="540" cy="400" r="290" fill="#dc2626" opacity="0.12" filter="url(#glow-ig)"/>
  <!-- Gold rings (double ring luxury system) -->
  <circle cx="540" cy="400" r="272" fill="none" stroke="url(#gold-ig)" stroke-width="3"   opacity="0.40"/>
  <circle cx="540" cy="400" r="262" fill="none" stroke="url(#gold-ig)" stroke-width="1"   opacity="0.60"/>
  <!-- Main red badge -->
  <circle cx="540" cy="400" r="252" fill="url(#red-badge-ig)" filter="url(#badge-shadow-ig)"/>
  <!-- Glass shimmer -->
  <ellipse cx="436" cy="296" rx="110" ry="66" fill="white" opacity="0.07"/>

  <!-- Lightning bolt — hero scale -->
  <g transform="translate(540,400) scale(3.6) translate(-50,-50)">
    <path d="M 57,4 L 24,54 L 47,54 L 43,96 L 76,46 L 53,46 Z"
      fill="white" filter="url(#bolt-glow-ig)"/>
    <path d="M 57,4 L 53,46 L 60,24 Z" fill="white" opacity="0.30"/>
    <path d="M 43,96 L 47,54 L 40,74 Z" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- Bottom gradient overlay -->
  <rect width="1080" height="1080" fill="url(#overlay-ig)"/>

  <!-- Gold rule flanking the text -->
  <line x1="60"  y1="720" x2="390" y2="720" stroke="url(#gold-ig)" stroke-width="1.5" opacity="0.60"/>
  <line x1="690" y1="720" x2="1020" y2="720" stroke="url(#gold-ig)" stroke-width="1.5" opacity="0.60"/>

  <!-- GOALRUSH -->
  <text x="540" y="810"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif"
    font-size="160" font-weight="900" fill="white" letter-spacing="2"
    filter="url(#text-shadow-ig)">GOALRUSH</text>

  <!-- Red underline accent bar -->
  <rect x="60" y="824" width="960" height="4" fill="#dc2626" rx="2"/>

  <!-- GLOBAL -->
  <text x="540" y="900"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="60" fill="url(#gold-ig)" letter-spacing="38"
    filter="url(#text-shadow-ig)">GLOBAL</text>

  <!-- Tagline -->
  <text x="540" y="968"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic" font-size="34" fill="#d4af37" opacity="0.82" letter-spacing="2.5"
    filter="url(#text-shadow-ig)">Football Never Sleeps.</text>

  <!-- Handle -->
  <text x="540" y="1030"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="22" fill="white" opacity="0.35" letter-spacing="3">@GOALRUSHGLOBAL</text>
</svg>
